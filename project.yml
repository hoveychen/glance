name: Glance
options:
  bundleIdPrefix: com.hoveychen
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.2"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "arm64 x86_64"
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: "YES"
    Release:
      ONLY_ACTIVE_ARCH: "NO"
targets:
  Glance:
    type: application
    platform: macOS
    sources:
      - Glance
    settings:
      base:
        INFOPLIST_FILE: Glance/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Glance/App/Glance.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.hoveychen.Glance
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6HU93XQG5B
      configs:
        Debug:
          BUNDLE_DISPLAY_NAME: "Glance Dev"
        Release:
          BUNDLE_DISPLAY_NAME: "Glance"
    entitlements:
      path: Glance/App/Glance.entitlements
      properties:
        com.apple.security.app-sandbox: false
