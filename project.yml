name: HackerScreen
options:
  bundleIdPrefix: com.hoveychen
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.2"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  HackerScreen:
    type: application
    platform: macOS
    sources:
      - HackerScreen
    settings:
      base:
        INFOPLIST_FILE: HackerScreen/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: HackerScreen/App/HackerScreen.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.hoveychen.HackerScreen
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6HU93XQG5B
    entitlements:
      path: HackerScreen/App/HackerScreen.entitlements
      properties:
        com.apple.security.app-sandbox: false
